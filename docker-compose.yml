services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
    volumes:
      - speedtester-data:/app/data
    networks:
      - app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - app

volumes:
  speedtester-data:

networks:
  app:
